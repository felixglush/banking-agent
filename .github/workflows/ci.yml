name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: compass
          POSTGRES_PASSWORD: compass
          POSTGRES_DB: compass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U compass -d compass"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright

      - name: Dependency direction lint
        run: bash scripts/check_dependency_direction.sh

      - name: Pytest
        # pytest exits with code 5 when no tests are collected.
        # We treat that as success here as a belt-and-braces for any
        # future subdir with no tests yet.
        env:
          COMPASS_TEST_PG_DSN: postgresql://compass:compass@localhost:5432/compass_test
          COMPASS_TEST_ADMIN_DSN: postgresql://compass:compass@localhost:5432/compass
        run: uv run pytest || [ $? -eq 5 ]
