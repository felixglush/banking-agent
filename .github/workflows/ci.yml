name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright

      - name: Dependency direction lint
        run: bash scripts/check_dependency_direction.sh

      - name: Pytest
        # pytest exits with code 5 when no tests are collected.
        # We treat that as success here; Stage 2+ will land real tests.
        run: uv run pytest || [ $? -eq 5 ]
