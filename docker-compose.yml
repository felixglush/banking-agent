services:
  postgres:
    image: postgres:18.4-alpine
    container_name: compass-postgres
    environment:
      POSTGRES_USER: compass
      POSTGRES_DB: compass
      # SCRAM-SHA-256 by default in PG 18 — same shape as Neon/RDS auth so
      # only the DSN (host, port, sslmode) changes when we move off Docker.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-compass}
    ports:
      - "5432:5432"
    volumes:
      - compass_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compass -d compass"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  compass_pgdata:
