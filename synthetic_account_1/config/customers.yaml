# Customer generator parameters. Names are drawn from a fixed pool so
# the output is deterministic without depending on Python's hash seed.

target_count: 120
acv_log_normal_mu: 10.2     # ln($26k)
acv_log_normal_sigma: 0.6   # gives a long-tail mean near $33k
kyc_status_weights:
  verified: 0.85
  pending: 0.08
  restricted: 0.05
  rejected: 0.02
default_payment_terms_options: [15, 30, 45, 60]
default_payment_terms_weights: [0.10, 0.55, 0.20, 0.15]

cohorts:
  - name: "enterprise"
    weight: 0.15
    acv_multiplier: 4.0
    contract_kinds: ["msa", "sow"]
  - name: "mid_market"
    weight: 0.35
    acv_multiplier: 1.2
    contract_kinds: ["msa", "retainer"]
  - name: "smb"
    weight: 0.50
    acv_multiplier: 0.4
    contract_kinds: ["retainer"]

# Pool of base company-name tokens used to construct customer names.
# Two-token combinations give >500 unique possibilities — plenty of
# room for 120 customers plus an ambiguous-name subset.
