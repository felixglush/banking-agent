# Mix of contract billing structures, weighted by cohort. The generator
# samples a kind for each customer (60 contracts total) from these mixes.

# Weights are normalized within each cohort.
cohort_billing_mix:
  enterprise:
    monthly_retainer: 0.4
    t_and_m_with_overrides: 0.4
    flat_fee_sow: 0.2
  mid_market:
    monthly_retainer: 0.5
    t_and_m_with_overrides: 0.3
    t_and_m_with_cap: 0.2
  smb:
    monthly_retainer: 0.7
    t_and_m_with_cap: 0.3

# Knobs sampled per generated contract.
monthly_retainer_amount_range_cents: [200_000, 8_000_000]      # $2k–$80k
flat_fee_sow_amount_range_cents: [800_000, 5_000_000]          # $8k–$50k
flat_fee_milestone_count_range: [2, 4]
rate_override_count_range: [1, 3]
rate_override_discount_pct_range: [10, 30]
monthly_hour_cap_options: [20, 40, 80, 120]

term_months_range: [6, 24]

# Fraction of contracts that are already expired before as_of_date.
expired_fraction: 0.15

# Source-doc-ref probability (string like "s3://contracts/<id>.pdf").
source_doc_ref_probability: 0.7

scope_summary_templates:
  - "Quarterly implementation services for {customer}."
  - "Ongoing platform integration and support for {customer}."
  - "Phase-1 onboarding and configuration for {customer}."
  - "Retainer-based premium support for {customer}."
  - "T&M engagement covering integration backlog for {customer}."
